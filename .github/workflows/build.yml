name: Build

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore QuanLyKhoHang.sln

      - name: Build
        run: dotnet build QuanLyKhoHang.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test QuanLyKhoHang.sln --configuration Release --no-build
